name: Update package version

on:
    schedule:
        - cron: "0 6 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version-file: tools/update/go.mod
                  cache-dependency-path: tools/update/go.sum

            - name: Check for update and patch melange.yaml
              id: update
              env:
                  GH_TOKEN: ${{ github.token }}
                  MELANGE_CONFIG: ../../melange.yaml
              working-directory: tools/update
              run: go run .

            - name: Create pull request
              if: steps.update.outputs.updated == 'true'
              uses: peter-evans/create-pull-request@v7
              with:
                  title: "Update anki-sync-server to ${{ steps.update.outputs.latest }}"
                  branch: update/anki-sync-server-${{ steps.update.outputs.latest }}
                  commit-message: "melange: update anki-sync-server to ${{ steps.update.outputs.latest }}"
                  body: |
                      Automated version bump of anki-sync-server from ${{ steps.update.outputs.current }} to ${{ steps.update.outputs.latest }}.
